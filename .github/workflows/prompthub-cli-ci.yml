name: PromptHub CLI CI

on:
  push:
    branches:
      - main
    paths:
      - PromptHubCLI/**
      - PromptHubSkillKit/**
      - .github/workflows/prompthub-cli-*.yml
      - README.md
      - tools/homebrew/**
  pull_request:
    paths:
      - PromptHubCLI/**
      - PromptHubSkillKit/**
      - .github/workflows/prompthub-cli-*.yml
      - README.md
      - tools/homebrew/**

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Run PromptHub CLI tests
        run: swift test --package-path PromptHubCLI

      - name: Verify ph entrypoint
        run: swift run --package-path PromptHubCLI ph --help

      - name: Run acceptance smoke matrix
        run: PromptHubCLI/Tests/Smoke/run-all.sh
