name: PromptHub CLI Release

on:
  push:
    tags:
      - ph-v*

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Derive release version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#ph-v}"

          if [[ -z "$VERSION" || "$VERSION" == "$TAG_NAME" ]]; then
            echo "Unable to derive version from tag: $TAG_NAME" >&2
            exit 1
          fi

          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run PromptHub CLI tests
        run: swift test --package-path PromptHubCLI

      - name: Run acceptance smoke matrix
        run: PromptHubCLI/Tests/Smoke/run-all.sh

      - name: Build release binary
        run: swift build --package-path PromptHubCLI -c release --product ph

      - name: Package release assets
        id: package
        run: |
          BIN_PATH="$(swift build --package-path PromptHubCLI -c release --product ph --show-bin-path)"
          mkdir -p dist/archive
          cp "$BIN_PATH/ph" dist/archive/ph
          tar -C dist/archive -czf dist/ph-macos-arm64.tar.gz ph
          ARCHIVE_SHA256="$(shasum -a 256 dist/ph-macos-arm64.tar.gz | awk '{print $1}')"

          printf '%s\n' "$ARCHIVE_SHA256" > dist/ph-macos-arm64.sha256

          echo "archive_sha256=$ARCHIVE_SHA256" >> "$GITHUB_OUTPUT"
          echo "archive_path=$(pwd)/dist/ph-macos-arm64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Smoke install via Homebrew formula
        env:
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          ARCHIVE_SHA256: ${{ steps.package.outputs.archive_sha256 }}
          ARCHIVE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAP_NAME="local/prompthub-release"
          trap 'brew uninstall --force ph >/dev/null 2>&1 || true; brew untap "$TAP_NAME" >/dev/null 2>&1 || true' EXIT

          brew untap "$TAP_NAME" >/dev/null 2>&1 || true
          brew tap-new "$TAP_NAME"
          TAP_REPO="$(brew --repository "$TAP_NAME")"

          cp Formula/ph.rb "$TAP_REPO/Formula/ph.rb"

          export HOMEBREW_PROMPTHUB_BOTTLE_URL="file://$ARCHIVE_PATH"
          export HOMEBREW_PROMPTHUB_BOTTLE_SHA256="$ARCHIVE_SHA256"
          export HOMEBREW_PROMPTHUB_BOTTLE_VERSION="$ARCHIVE_VERSION"

          brew install "$TAP_NAME/ph"
          installed_path="$(brew --prefix "$TAP_NAME/ph")/bin/ph"
          if [[ ! -x "$installed_path" ]]; then
            echo "Homebrew install did not produce ph at $installed_path" >&2
            exit 1
          fi
          "$installed_path" --help | head -1
          brew test "$TAP_NAME/ph"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/ph-macos-arm64.tar.gz
            dist/ph-macos-arm64.sha256
