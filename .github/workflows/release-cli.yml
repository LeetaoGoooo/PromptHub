name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build PromptHub CLI
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - arch: arm64
            platform: macos-arm64
          - arch: x86_64
            platform: macos-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build CLI (release)
        run: |
          arch -${{ matrix.arch }} swift build \
            --package-path PromptHubCLI \
            --configuration release \
            --arch ${{ matrix.arch }}

      - name: Package binary
        run: |
          BINARY="PromptHubCLI/.build/${{ matrix.arch }}-apple-macosx/release/prompthub"
          ARCHIVE="prompthub-${{ matrix.platform }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompthub-${{ matrix.platform }}
          path: |
            prompthub-${{ matrix.platform }}.tar.gz
            prompthub-${{ matrix.platform }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prompthub-*.tar.gz
            prompthub-*.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## PromptHub CLI

            Install with Homebrew:
            ```sh
            brew tap LeetaoGoooo/tap
            brew install LeetaoGoooo/tap/prompthub
            ```

            Or with curl:
            ```sh
            curl -fsSL https://raw.githubusercontent.com/LeetaoGoooo/PromptHub/main/install.sh | sh
            ```

            Verify:
            ```sh
            prompthub agent doctor
            ```
